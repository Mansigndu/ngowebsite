<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship - We For A Cause</title>
    <script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<style>
  body,html{
    overflow-x: hidden;
  }
</style>
<body>
    <div class="nav"></div>
<!-- Internship Form Section -->
<section class="bg-slate-50 py-16 px-4">

<div class="max-w-4xl mx-auto">

<!-- Heading -->
<div class="text-center mb-10">
<h1 class="text-3xl md:text-4xl font-bold text-slate-900 mt-20 mb-2">
Internship Application
</h1>

<p class="text-teal-600 font-semibold tracking-wide">
Upgrade your skills with We For A Cause Foundation
</p>
</div>


<!-- Form -->
<form class="bg-white shadow-xl rounded-2xl p-6 md:p-10 space-y-6">

<!-- Name -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="text-sm font-medium text-gray-700">
Full Name *
</label>

<input type="text"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>


<div>
<label class="text-sm font-medium text-gray-700">
Email *
</label>

<input type="email"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>

</div>


<!-- Phone + City -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="text-sm font-medium text-gray-700">
Phone Number *
</label>

<input type="tel"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>

<div>
<label class="text-sm font-medium text-gray-700">
City *
</label>

<input type="text"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>

</div>


<!-- College -->
<div>
<label class="text-sm font-medium text-gray-700">
College / University *
</label>

<input type="text"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>


<!-- Internship Type -->
<div>
  <label class="text-sm font-medium text-gray-700">
    Preferred Internship Role
  </label>

  <select id="roleSelect"
    class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
    focus:ring-2 focus:ring-teal-500">

    <option value="">Select a role</option>
    <option value="Animal Care">Animal Care</option>
    <option value="Social Media">Social Media</option>
    <option value="Fundraising">Fundraising</option>
    <option value="Rescue Support">Rescue Support</option>
    <option value="Other">Other</option>

  </select>
</div>

<!-- Hidden Input -->
<div id="otherRoleField" class="mt-4 hidden">
  <label class="text-sm font-medium text-gray-700">
    Please specify
  </label>

  <input type="text"
    placeholder="Enter your preferred role"
    class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
    focus:ring-2 focus:ring-teal-500">
</div>
<!-- Message -->
<div>
<label class="text-sm font-medium text-gray-700">
Why do you want to intern with us?
</label>

<textarea rows="3"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500"></textarea>
</div>


<!-- Submit -->
<div class="text-center pt-4">

<button
class="bg-teal-500 hover:bg-teal-600 text-white
px-10 py-3 rounded-full font-semibold transition shadow-md">

Submit Application

</button>

</div>

</form>

</div>

</section>




<div class="footer"></div>
    
</body>
<script src="./footer.js"></script>
<script src="./nav.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>


<script>
  const projectBtn = document.getElementById("projects-btn");
const projectMenu = document.getElementById("projects-menu");

projectBtn.addEventListener("click", () => {
  projectMenu.classList.toggle("hidden");
});
  const projectToggle = document.getElementById("project-toggle");
const projectMobile = document.getElementById("project-mobile");

projectToggle.addEventListener("click", () => {
  projectMobile.classList.toggle("hidden");
});

/* MOBILE MENU TOGGLE */

const menuBtn = document.getElementById("menu-btn")
const mobileMenu = document.getElementById("mobile-menu")

menuBtn.addEventListener("click", () => {

mobileMenu.classList.toggle("hidden")

})

const counters = document.querySelectorAll('.counter');

counters.forEach(counter => {

const updateCount = () => {

const target = +counter.getAttribute('data-target');
const count = +counter.innerText;

const speed = 50;

const inc = target / speed;

if(count < target){

counter.innerText = Math.ceil(count + inc);
setTimeout(updateCount,30);

}

else{

counter.innerText = target;

}

};

updateCount();

});



AOS.init({
duration:1000,
once:true
});
const faqButtons = document.querySelectorAll('.faq-btn');

  faqButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const answer = btn.nextElementSibling;
      const icon = btn.querySelector('.faq-icon');

      answer.classList.toggle('hidden');
      icon.textContent = answer.classList.contains('hidden') ? '+' : '-';
    });
  });
AOS.init({
    once: true,
    duration: 800,
    offset: 120,
  });




// CLOSE MENU WHEN SCROLL
window.addEventListener("scroll", () => {
mobileMenu.classList.add("hidden");
});
const roleSelect = document.getElementById("roleSelect");
  const otherField = document.getElementById("otherRoleField");

  roleSelect.addEventListener("change", function () {
    if (this.value === "Other") {
      otherField.classList.remove("hidden");
    } else {
      otherField.classList.add("hidden");
    }
  });


</script>
</html>
