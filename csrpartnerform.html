<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSR Partnership</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  html, body {
    overflow-x: hidden;
    font-family: 'Poppins', sans-serif;
  }
</style>
</head>

<body class="bg-slate-50">

<!-- NAV -->
<div class="nav"></div>

<!-- SECTION -->
<section class="py-16 px-4">
  <div class="max-w-4xl mx-auto">

    <!-- HEADING -->
    <div class="text-center mb-10" data-aos="fade-down">
      <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mt-20 mb-2">
        CSR Partnership Form
      </h1>
      <p class="text-teal-600 font-semibold">
        Collaborate with us to create meaningful impact
      </p>
    </div>

    <!-- FORM CARD -->
    <form class="bg-white shadow-xl rounded-2xl p-6 md:p-10 space-y-6" data-aos="fade-up">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm font-medium text-gray-700">Company Name *</label>
          <input type="text" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" required>
        </div>

        <div>
          <label class="text-sm font-medium text-gray-700">Contact Person *</label>
          <input type="text" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" required>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm font-medium text-gray-700">Designation</label>
          <input type="text" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
        </div>

        <div>
          <label class="text-sm font-medium text-gray-700">Email *</label>
          <input type="email" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" required>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm font-medium text-gray-700">Phone *</label>
          <input type="tel" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" required>
        </div>

        <div>
          <label class="text-sm font-medium text-gray-700">City</label>
          <input type="text" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="text-sm font-medium text-gray-700">State</label>
          <input type="text" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
        </div>

        <div>
          <label class="text-sm font-medium text-gray-700">Designation (CSR Role)</label>
          <input type="text" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
      </div>

      <div>
        <label class="text-sm font-medium text-gray-700">CSR Focus Area / Message</label>
        <textarea rows="4" class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"></textarea>
      </div>

      <div class="text-center pt-4">
        <button class="bg-teal-500 hover:bg-teal-600 text-white px-10 py-3 rounded-full font-semibold shadow-md transition">
          Submit
        </button>
      </div>

    </form>

  </div>
</section>

<div class="footer"></div>

<script src="./nav.js"></script>
<script src="./footer.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({ duration: 1000, once: true });
</script>

</body>
</html>
