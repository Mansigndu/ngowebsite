<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - We For A Cause</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body, html {
      overflow-x: hidden;
    }
  </style>
</head>

<body class="bg-gray-50">

<!-- NAV -->
<div class="nav"></div>

<section class="py-16">
  <div class="max-w-7xl mx-auto px-5">

    <!-- Heading -->
    <div class="text-center mb-10">
      <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mt-16">
        Our <span class="text-[#2A9D8F]">Gallery</span>
      </h2>
      <p class="text-gray-600 mt-2">
        Moments from our rescue and community work
      </p>
      <p class="text-sm text-gray-400 mt-2">
        Tap on image to view full size
      </p>
    </div>

    <!-- Gallery Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5 sm:gap-6">

      <!-- Image -->
      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/gaaaaa.jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/feeding.jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/dogii.JPG"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/fundraising.JPG"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/adoption.JPG"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/abouts (2).jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/adoption2.jpeg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/cat.jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/gallery2.jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/gallery3.jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/gallery5.jpg"
             class="w-full aspect-[4/5] object-cover object-top group-hover:scale-105 transition duration-300">

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">

      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/gallery13.jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">
        <img src="./newimages/gallery14.jpg"
             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">

      <div class="rounded-xl overflow-hidden shadow-md group cursor-pointer">

             class="w-full aspect-[4/5] object-cover group-hover:scale-105 transition duration-300">
      </div>

    </div>
  </div>
</section>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50">
  <img id="lightbox-img" class="max-h-[90%] max-w-[90%] rounded-lg">
</div>

<!-- FOOTER -->
<div class="footer"></div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
  duration: 1000,
  once: true
});

// LIGHTBOX
const images = document.querySelectorAll("img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.classList.remove("hidden");
    lightbox.classList.add("flex");
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.classList.add("hidden");
});
</script>

<script src="./nav.js"></script>
<script src="./footer.js"></script>

</body>
</html>
