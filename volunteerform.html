<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Form | WE FOR A CAUSE</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
    }
    body,
    html {
      overflow-x: hidden;
    }
  </style>
</head>
<body class="antialiased">

  <!-- NAVBAR -->

<!-- PROFESSIONAL RESPONSIVE NAVBAR -->

<div class="nav">
</div>
  
<!-- Volunteer Form Section -->
<section class="bg-slate-50 py-16 px-4">

<div class="max-w-4xl mx-auto">

<!-- Heading -->
<div class="text-center mb-10" data-aos="fade-down">
<h2 class="text-3xl md:text-4xl font-bold text-slate-900  mt-20 mb-2">
Become a Volunteer
</h2>

<p class="text-teal-600 font-semibold tracking-wide">
Join our mission to rescue and care for animals
</p>
</div>


<!-- Form -->
<form class="bg-white shadow-xl rounded-2xl p-6 md:p-10 space-y-6" data-aos="fade-up">

<!-- Name + Email -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="text-sm font-medium text-gray-700">
Full Name *
</label>

<input type="text"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>


<div>
<label class="text-sm font-medium text-gray-700">
Email *
</label>

<input type="email"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>

</div>


<!-- Phone + City -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="text-sm font-medium text-gray-700">
Phone Number *
</label>

<input type="tel"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>

<div>
<label class="text-sm font-medium text-gray-700">
City *
</label>

<input type="text"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500 outline-none">
</div>

</div>


<!-- Volunteer Role -->
<div>

<label class="text-sm font-medium text-gray-700">
How would you like to help?
</label>

<div>
  <select id="volunteerRole"
    required
    class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
    focus:ring-2 focus:ring-teal-500 text-sm md:text-base">

    <option value="">Select Volunteer Role</option>
    <option value="Animal Rescue">Animal Rescue</option>
    <option value="Animal Care">Animal Care</option>
    <option value="Social Media">Social Media</option>
    <option value="Fundraising">Fundraising</option>
    <option value="Other">Other</option>

  </select>
</div>

<!-- Hidden Input -->
<div id="otherVolunteerField" class="mt-4 hidden">
  <label class="text-sm font-medium text-gray-700">
    Please specify
  </label>

  <input type="text"
    id="otherVolunteerInput"
    placeholder="Enter your role"
    class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
    focus:ring-2 focus:ring-teal-500 text-sm md:text-base">
</div>
</div>


<!-- Message -->
<div>

<label class="text-sm font-medium text-gray-700">
Message
</label>

<textarea rows="3"
class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg
focus:ring-2 focus:ring-teal-500"></textarea>

</div>


<!-- Submit -->
<div class="text-center pt-4">

<button
class="bg-teal-500 hover:bg-teal-600 text-white
px-10 py-3 rounded-full font-semibold transition shadow-md">

Submit Application

</button>

</div>

</form>


<!-- Note -->
<p class="text-gray-500 text-sm text-center mt-6">
We respect your privacy. Your information will not be shared.
</p>

</div>

</section>


  <div class="footer"></div>

  <!-- AOS JS -->
   <script src="./footer.js"></script>
   <script src="./nav.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
  const projectBtn = document.getElementById("projects-btn");
const projectMenu = document.getElementById("projects-menu");

projectBtn.addEventListener("click", () => {
  projectMenu.classList.toggle("hidden");
});
  const projectToggle = document.getElementById("project-toggle");
const projectMobile = document.getElementById("project-mobile");

projectToggle.addEventListener("click", () => {
  projectMobile.classList.toggle("hidden");
});

/* MOBILE MENU TOGGLE */

const menuBtn = document.getElementById("menu-btn")
const mobileMenu = document.getElementById("mobile-menu")

menuBtn.addEventListener("click", () => {

mobileMenu.classList.toggle("hidden")

})

const counters = document.querySelectorAll('.counter');

counters.forEach(counter => {

const updateCount = () => {

const target = +counter.getAttribute('data-target');
const count = +counter.innerText;

const speed = 50;

const inc = target / speed;

if(count < target){

counter.innerText = Math.ceil(count + inc);
setTimeout(updateCount,30);

}

else{

counter.innerText = target;

}

};

updateCount();

});



AOS.init({
duration:1000,
once:true
});
const faqButtons = document.querySelectorAll('.faq-btn');

  faqButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const answer = btn.nextElementSibling;
      const icon = btn.querySelector('.faq-icon');

      answer.classList.toggle('hidden');
      icon.textContent = answer.classList.contains('hidden') ? '+' : '-';
    });
  });
AOS.init({
    once: true,
    duration: 800,
    offset: 120,
  });




// CLOSE MENU WHEN SCROLL
window.addEventListener("scroll", () => {
mobileMenu.classList.add("hidden");
});

  const volunteerRole = document.getElementById("volunteerRole");
  const otherVolunteerField = document.getElementById("otherVolunteerField");
  const otherVolunteerInput = document.getElementById("otherVolunteerInput");

  volunteerRole.addEventListener("change", function () {
    if (this.value === "Other") {
      otherVolunteerField.classList.remove("hidden");
      otherVolunteerInput.setAttribute("required", "true");
    } else {
      otherVolunteerField.classList.add("hidden");
      otherVolunteerInput.removeAttribute("required");
    }
  });




</script>
</html>
